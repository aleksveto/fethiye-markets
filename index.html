<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Рынки Фетхие</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f8;
}

h1{
text-align:center;
font-size:22px;
margin:10px;
}

#map{
height:55vh;
}

.menu{
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
}

.item{
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.day{
font-weight:bold;
font-size:16px;
margin-bottom:6px;
}

.desc{
font-size:14px;
color:#444;
margin-bottom:8px;
}

.buttons{
display:flex;
gap:6px;
}

button{
flex:1;
padding:10px;
border:none;
border-radius:6px;
font-size:15px;
background:#2b7cff;
color:white;
}

.route{
background:#34a853;
}

</style>
</head>

<body>

<h1>Рынки Фетхие</h1>

<div id="map"></div>

<div class="menu" id="list"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([36.621,29.116],12);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map);

var markets=[

{
day:"Понедельник",
name:"Pazaryeri Market",
coords:[36.621,29.120],
route:"https://maps.app.goo.gl/J4Q1PncEETmQRBEW6",
desc:"Крупный городской рынок."
},

{
day:"Вторник",
name:"Tuesday Market",
coords:[36.630,29.110],
route:"https://maps.app.goo.gl/JZbgWc18sW277ZUx6",
desc:"Популярный продуктовый рынок."
},

{
day:"Четверг — Патлангыч",
name:"Patlangıç Pazarı",
coords:[36.640,29.120],
route:"https://maps.app.goo.gl/mSyfS4rwJtZkRyFC7",
desc:"Районный рынок Патлангыч."
},

{
day:"Четверг — Чифтлик",
name:"Çiftlik Pazarı",
coords:[36.665,29.050],
route:"https://maps.app.goo.gl/aaFgXknuASujo5Lb6",
desc:"Рынок в районе Чифтлик."
},

{
day:"Пятница",
name:"Friday Market",
coords:[36.630,29.110],
route:"https://maps.app.goo.gl/JZbgWc18sW277ZUx6",
desc:"Текстиль и овощи."
},

{
day:"Суббота — Пазарьери",
name:"Pazaryeri",
coords:[36.621,29.120],
route:"https://maps.app.goo.gl/XXtjQJLaYwMVeCve9",
desc:"Большой центральный рынок."
},

{
day:"Суббота — Чамкёй",
name:"Çamköy Pazarı",
coords:[36.650,29.160],
route:"https://maps.app.goo.gl/B576Emx2e5BHqqkh8",
desc:"Рынок района Чамкёй."
},

{
day:"Воскресенье",
name:"Sunday Market",
coords:[36.615,29.105],
route:"https://maps.app.goo.gl/yu5NGyyUathdK2ii8",
desc:"Воскресный рынок."
}

];

var list=document.getElementById("list");

markets.forEach(function(m){

var marker=L.marker(m.coords).addTo(map);

marker.bindPopup(
"<b>"+m.day+"</b><br>"+m.desc+
"<br><br><a href='"+m.route+"' target='_blank'>Маршрут</a>"
);

var item=document.createElement("div");
item.className="item";

item.innerHTML=
"<div class='day'>"+m.day+"</div>"+
"<div class='desc'>"+m.desc+"</div>"+
"<div class='buttons'>"+
"<button onclick='go("+m.coords+")'>Показать</button>"+
"<button class='route' onclick=\"window.open('"+m.route+"')\">Маршрут</button>"+
"</div>";

list.appendChild(item);

});

function go(coords){

map.setView(coords,15);

}

</script>

</body>
</html>

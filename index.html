<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Рынки Фетхие</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f8;
}

h1{
text-align:center;
margin:10px;
font-size:22px;
}

#map{
height:70vh;
}

.info{
padding:10px;
font-size:14px;
text-align:center;
}

.label{
background:white;
padding:2px 6px;
border-radius:6px;
font-size:12px;
box-shadow:0 1px 4px rgba(0,0,0,0.3);
}

.today-label{
background:#0a8a00;
color:white;
font-weight:bold;
}
  
</style>

</head>

<body>

<h1>Рынки Фетхие по дням недели</h1>

<div id="map"></div>

<div class="info">
Нажмите на метку для описания и кнопки маршрута
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([36.62,29.11],12);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map);

/* номер сегодняшнего дня */
var today = new Date().getDay();

/* соответствие названия дня номеру */
var dayIndex={
"Воскресенье":0,
"Понедельник":1,
"Вторник":2,
"Среда":3,
"Четверг":4,
"Пятница":5,
"Суббота":6
};

var markets=[

{
day:"Понедельник",
coords:[36.62158,29.11556],
route:"https://maps.app.goo.gl/J4Q1PncEETmQRBEW6",
desc:"Большой центральный рынок."
},

{
day:"Вторник",
coords:[36.63261,29.11502],
route:"https://maps.app.goo.gl/JZbgWc18sW277ZUx6",
desc:"Популярный рынок текстиля и овощей."
},

{
day:"Четверг — Патлангыч",
coords:[36.64075,29.12394],
route:"https://maps.app.goo.gl/mSyfS4rwJtZkRyFC7",
desc:"Районный рынок Патлангыч."
},

{
day:"Четверг — Чифтлик",
coords:[36.66578,29.05536],
route:"https://maps.app.goo.gl/aaFgXknuASujo5Lb6",
desc:"Рынок района Чифтлик."
},

{
day:"Пятница",
coords:[36.63261,29.11502],
route:"https://maps.app.goo.gl/JZbgWc18sW277ZUx6",
desc:"Рынок овощей, фруктов и текстиля."
},

{
day:"Суббота — Пазарьери",
coords:[36.62158,29.11556],
route:"https://maps.app.goo.gl/XXtjQJLaYwMVeCve9",
desc:"Один из крупнейших рынков Фетхие."
},

{
day:"Суббота — Чамкёй",
coords:[36.64840,29.15850],
route:"https://maps.app.goo.gl/B576Emx2e5BHqqkh8",
desc:"Рынок района Чамкёй."
},

{
day:"Воскресенье",
coords:[36.61470,29.10320],
route:"https://maps.app.goo.gl/yu5NGyyUathdK2ii8",
desc:"Воскресный продуктовый рынок."
}

];

markets.forEach(function(m){

/* определяем номер дня */
var shortDay = m.day.split(" ")[0];
var index = dayIndex[shortDay];

/* цвет маркера */
var icon = (index === today)
? "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png"
: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png";

var marker = L.marker(m.coords,{icon:L.icon({

iconUrl:icon,
shadowUrl:"https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
iconSize:[25,41],
iconAnchor:[12,41]

})}).addTo(map);

/* подсветка подписи */
var labelClass = (index === today) ? "label today-label" : "label";

marker.bindTooltip(
m.day,
{permanent:true,direction:"top",className:labelClass}
);

marker.bindPopup(
"<b>"+m.day+"</b><br>"+m.desc+
"<br><br><a href='"+m.route+"' target='_blank'>Построить маршрут</a>"
);

});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Рынки Фетхие по дням недели</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f6f8;
}

h1{
text-align:center;
padding:12px;
margin:0;
font-size:22px;
}

.list{
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
}

.item{
background:white;
border-radius:10px;
padding:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.day{
font-size:18px;
font-weight:bold;
margin-bottom:6px;
}

.desc{
font-size:14px;
margin-bottom:10px;
color:#444;
}

.buttons{
display:flex;
gap:8px;
}

button{
flex:1;
padding:12px;
font-size:16px;
border:none;
border-radius:8px;
background:#2b7cff;
color:white;
}

.route{
background:#34a853;
}

.map{
width:100%;
height:45vh;
border:none;
}

</style>

</head>

<body>

<h1>Рынки Фетхие</h1>

<div class="list">

<div class="item">
<div class="day">Понедельник</div>

<div class="buttons">
<button onclick="show('https://maps.app.goo.gl/J4Q1PncEETmQRBEW6')">Показать на карте</button>

</div>

</div>
</div>

<div class="day">Пятница</div>

<iframe id="map" class="map"></iframe>

<script>

function show(link){
document.getElementById("map").src = link + "&output=embed";
}

function route(link){
window.open(link, "_blank");
}

</script>

</html>

<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Рынки Фетхие</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#fff9f3;
}

h1{
text-align:center;
margin:10px;
font-size:32px;
}

#map{
height:70vh;
}

.info{
padding:10px;
font-size:16px;
text-align:center;
}

.label{
background:white;
padding:2px 6px;
border-radius:6px;
font-size:14px;
box-shadow:0 1px 4px rgba(0,0,0,0.3);
}

.today-label{
background:#449744;
color:white;
font-weight:bold;
}



#map{
height:calc(70vh - 50px);
}

.map-container{
position:relative;
}

.map-top{
position:absolute;
top:0;
left:0;
width:100%;
height:15px;
background:linear-gradient(
to bottom,
#fff9f3 0%,
#fff9f3 60%,
#fff9f36e 80%,
#fff9f300 100%
);
z-index:1000;
}
  
.chat-bg{
position:absolute;
bottom:0;
left:0;
width:100%;
height:25px;
background:linear-gradient(
to top,
#fff9f3 0%,
#fff9f3 60%,
#fff9f36e 80%,
#fff9f300 100%
);
z-index:1000;
}
  
.chat-button{
position:absolute;
bottom:-25px;
left:50%;
transform:translateX(-50%);
background:#0099cc;
color:white;
padding:8px 16px;
border-radius:8px;
font-size:14px;
text-decoration:none;
box-shadow:0 3px 10px rgba(0,0,0,0.4);
z-index:1001;
}

.share-panel{
position:fixed;
bottom:8px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:8px;
background:#fff9f3;
padding:4px;
z-index:999;
}

.share-btn{
background:#fff9f3;
color:#0099cc;
padding:8px 14px;
border-radius:8px;
font-size:14px;
text-decoration:none;
border:none;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

  
</style>

</head>

<body>

<h1>Рынки Фетхие</h1>

<div class="info">
Нажмите на метку для доступа к описанию и кнопке маршрута.<br>
Сегодняшний рынок выделен зелёным цветом.  
</div>

<div class="map-container">
<div class="map-top"></div>
<div id="map"></div>
<div class="chat-bg"></div>
<a class="chat-button"
href="https://t.me/fethiye_oludeniz/2"
target="_blank">

Чат Фетхие – Олюдениз

</a>

</div>
  
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([36.62,29.11],12);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map);

/* номер сегодняшнего дня */
var today = new Date().getDay();

/* соответствие названия дня номеру */
var dayIndex={
"Воскресенье":0,
"Понедельник":1,
"Вторник":2,
"Среда":3,
"Четверг":4,
"Пятница":5,
"Суббота":6
};

var markets=[

{
day:"Понедельник - Хисарёню",
coords:[36.570737, 29.140477],
route:"https://maps.app.goo.gl/J4Q1PncEETmQRBEW6",
desc:"Локальный рынок, ближе всего к отелям Олюдениза."
},

{
days:[2,5],
day:"Вторник, пятница - центр Фетхие",
coords:[36.62381804331752, 29.120489099546223],
route:"https://maps.app.goo.gl/JZbgWc18sW277ZUx6",
desc:"Главный рынок Фетхие."
},

{
day:"Четверг — Патлангыч",
coords:[36.619910, 29.142879],
route:"https://maps.app.goo.gl/mSyfS4rwJtZkRyFC7",
desc:"Оптимальный вариант при поездке из Олюдениза."
},

{
day:"Четверг — Чифтлик",
coords:[36.693408, 29.090428],
route:"https://maps.app.goo.gl/aaFgXknuASujo5Lb6",
desc:"Локальный рынок."
},

{
day:"Суббота — Пазарьери",
coords:[36.629241, 29.145836],
route:"https://maps.app.goo.gl/XXtjQJLaYwMVeCve9",
desc:"Универсальный рынок среднего размера."
},

{
day:"Суббота — Чамкёй",
coords:[36.659626, 29.156176],
route:"https://maps.app.goo.gl/B576Emx2e5BHqqkh8",
desc:"Локальный рынок."
},

{
day:"Суббота — Чалыджа",
coords:[36.64152709294995, 29.171788201577765],
route:"https://maps.app.goo.gl/Zyaq2Ps6swXjEfd59",
desc:"Локальный рынок."
},  

{
day:"Воскресенье",
coords:[36.657536, 29.123002],
route:"https://maps.app.goo.gl/yu5NGyyUathdK2ii8",
desc:"Универсальный рынок среднего размера."
}

];

markets.forEach(function(m){

/* определяем номер дня */
var shortDay = m.day.split(" ")[0];
var isToday = m.days ? m.days.includes(today) : dayIndex[shortDay] === today;

/* цвет маркера */
var icon = isToday
? "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png"
: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png";

var marker = L.marker(m.coords,{icon:L.icon({

iconUrl:icon,
shadowUrl:"https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
iconSize:[25,41],
iconAnchor:[12,41]

})}).addTo(map);

/* подсветка подписи */
var labelClass = isToday ? "label today-label" : "label";

marker.bindTooltip(
m.day,
{permanent:true,direction:"margin-top: 10px",className:labelClass}
);

marker.bindPopup(
"<b>"+m.day+"</b><br>"+m.desc+
"<br><br><a href='"+m.route+"' target='_blank'>Построить маршрут</a>"
);

});

</script>
 
<div class="share-panel">

<a class="share-btn"
href="https://t.me/share/url?url=https://aleksveto.github.io/fethiye-markets/&text=Карта%20рынков%20Фетхие"
target="_blank">
Поделиться в Telegram
</a>

<button class="share-btn" onclick="copyLink()">
Скопировать ссылку
</button>

</div>

<script>
function copyLink(){
navigator.clipboard.writeText(window.location.href);
alert("Ссылка скопирована");
}
</script>
  
<script data-goatcounter="https://aleksvet.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>  

</body>
</html>

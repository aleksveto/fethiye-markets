<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Рынки Фетхие</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f8;
}

h1{
text-align:center;
font-size:22px;
margin:10px;
}

#map{
width:100%;
height:60vh;
border:none;
}

.menu{
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
}

button{
padding:12px;
border:none;
border-radius:8px;
background:#2b7cff;
color:white;
font-size:16px;
}

.route{
background:#34a853;
}

</style>

</head>

<body>

<h1>Рынки Фетхие</h1>

<iframe id="map"
src="https://www.google.com/maps?q=fethiye&output=embed"></iframe>


<div class="menu">

<button onclick="showMarket('https://maps.app.goo.gl/J4Q1PncEETmQRBEW6')">
Понедельник
</button>

<button onclick="showMarket('https://maps.app.goo.gl/JZbgWc18sW277ZUx6')">
Вторник
</button>

<button onclick="showMarket('https://maps.app.goo.gl/mSyfS4rwJtZkRyFC7')">
Четверг — Патлангыч
</button>

<button onclick="showMarket('https://maps.app.goo.gl/aaFgXknuASujo5Lb6')">
Четверг — Чифтлик
</button>

<button onclick="showMarket('https://maps.app.goo.gl/JZbgWc18sW277ZUx6')">
Пятница
</button>

<button onclick="showMarket('https://maps.app.goo.gl/XXtjQJLaYwMVeCve9')">
Суббота — Пазарьери
</button>

<button onclick="showMarket('https://maps.app.goo.gl/B576Emx2e5BHqqkh8')">
Суббота — Чамкёй
</button>

<button onclick="showMarket('https://maps.app.goo.gl/yu5NGyyUathdK2ii8')">
Воскресенье
</button>

<button onclick="todayMarket()">
Сегодняшний рынок
</button>

</div>



<script>

function showMarket(link){

document.getElementById("map").src =
link.replace("maps.app.goo.gl","www.google.com/maps") + "&output=embed";

}


/* ===== БЛОК ГЕОЛОКАЦИИ =====
   его можно полностью удалить
*/

function showMyLocation(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(pos){

var lat = pos.coords.latitude;
var lon = pos.coords.longitude;

document.getElementById("map").src =
"https://www.google.com/maps?q="+lat+","+lon+"&z=14&output=embed";

});

}

}

/* ===== конец блока геолокации ===== */



function todayMarket(){

var day = new Date().getDay();

var markets=[

'https://maps.app.goo.gl/yu5NGyyUathdK2ii8',
'https://maps.app.goo.gl/J4Q1PncEETmQRBEW6',
'https://maps.app.goo.gl/JZbgWc18sW277ZUx6',
'https://maps.app.goo.gl/JZbgWc18sW277ZUx6',
'https://maps.app.goo.gl/mSyfS4rwJtZkRyFC7',
'https://maps.app.goo.gl/JZbgWc18sW277ZUx6',
'https://maps.app.goo.gl/XXtjQJLaYwMVeCve9'

];

showMarket(markets[day]);

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Рынки Фетхие</title>

<link href="https://cdn.jsdelivr.net/npm/ol@v9.2.4/ol.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:Arial;
}

h1{
text-align:center;
margin:10px;
font-size:22px;
}

.info{
padding:10px;
font-size:14px;
text-align:center;
}
  
#map{
height:75vh;
width:100%;
}

.popup{
background:white;
padding:6px 10px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.3);
font-size:14px;
}

.today{
color:#0a8a00;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Рынки Фетхие</h1>

<div class="info">
Нажмите на метку для описания и кнопки маршрута
</div>
  
<div id="map"></div>

<script src="https://cdn.jsdelivr.net/npm/ol@v9.2.4/dist/ol.js"></script>

<script>

var today=new Date().getDay();

var markets=[

{
day:1,
name:"Понедельник",
coord:[36.570737, 29.140477],
route:"https://maps.app.goo.gl/J4Q1PncEETmQRBEW6",
desc:"Большой центральный рынок"
},

{
day:2,
name:"Вторник",
coord:[36.624421, 29.121926],
link:"https://maps.app.goo.gl/JZbgWc18sW277ZUx6",
desc:"Популярный рынок"
},

{
day:4,
name:"Четверг — Патлангыч",
coord:[36.619910, 29.142879],
link:"https://maps.app.goo.gl/mSyfS4rwJtZkRyFC7",
desc:"Районный рынок"
},

{
day:4,
name:"Четверг — Чифтлик",
coord:[36.693408, 29.090428],
link:"https://maps.app.goo.gl/aaFgXknuASujo5Lb6",
desc:"Рынок района Чифтлик"
},

{
day:5,
name:"Пятница",
coord:[36.624429, 29.121775],
link:"https://maps.app.goo.gl/JZbgWc18sW277ZUx6",
desc:"Овощи и текстиль"
},

{
day:6,
name:"Суббота — Пазарьери",
coord:[36.629241, 29.145836],
link:"https://maps.app.goo.gl/XXtjQJLaYwMVeCve9",
desc:"Крупный рынок"
},

{
day:6,
name:"Суббота — Чамкёй",
coord:[36.659626, 29.156176],
link:"https://maps.app.goo.gl/B576Emx2e5BHqqkh8",
desc:"Рынок района Чамкёй"
},

{
day:0,
name:"Воскресенье",
coord:[36.657178, 29.122674],
link:"https://maps.app.goo.gl/yu5NGyyUathdK2ii8",
desc:"Воскресный рынок"
}

];

var features=[];

markets.forEach(function(m){

var feature=new ol.Feature({

geometry:new ol.geom.Point(
ol.proj.fromLonLat(m.coord)
),

data:m

});

features.push(feature);

});

var vectorSource=new ol.source.Vector({

features:features

});

var vectorLayer=new ol.layer.Vector({

source:vectorSource,

style:function(feature){

var d=feature.get("data");

var color=(d.day==today)?"green":"red";

return new ol.style.Style({

image:new ol.style.Circle({

radius:7,

fill:new ol.style.Fill({color:color}),

stroke:new ol.style.Stroke({color:"#fff",width:2})

})

});

}

});

var map=new ol.Map({

target:"map",

layers:[

new ol.layer.Tile({

source:new ol.source.OSM()

}),

vectorLayer

],

view:new ol.View({

center:ol.proj.fromLonLat([29.11,36.62]),

zoom:12

})

});

map.on("click",function(evt){

map.forEachFeatureAtPixel(evt.pixel,function(feature){

var d=feature.get("data");

var html=

"<div class='popup'>"+

"<b class='"+(d.day==today?"today":"")+"'>"+d.name+"</b><br>"+

d.desc+

"<br><br><a href='"+d.link+"' target='_blank'>Маршрут</a>"+

"</div>";

var overlay=new ol.Overlay({

element:document.createElement("div"),

position:evt.coordinate

});

overlay.getElement().innerHTML=html;

map.addOverlay(overlay);

});

});

</script>

</body>
</html>
